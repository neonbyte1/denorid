name: Release

on:
  push:
    tags:
      - '20*'

jobs:
  logger:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/jsr.yml
    with:
      package: logger

  injector:
    needs: logger
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/jsr.yml
    with:
      package: injector

  core:
    needs: injector
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/jsr.yml
    with:
      package: core

  publish:
    needs: core
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        package:
          - drizzle
          - platform-hono
    uses: ./.github/workflows/jsr.yml
    with:
      package: ${{ matrix.package }}
